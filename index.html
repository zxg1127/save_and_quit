<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mement - Support Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4B5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #FF8C00;
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8B4513;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .description {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .language-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .language-card {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            min-width: 200px;
        }
        
        .language-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(255,140,0,0.3);
        }
        
        .flag {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .language-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .policy-name {
            font-size: 14px;
            color: #999;
        }
        
        .info {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            color: #666;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }
            
            .language-selector {
                flex-direction: column;
            }
            
            .language-card {
                padding: 20px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>Mement</h1>
        <div class="subtitle">Innovation & Technology</div>
        <div class="description">
            Creating meaningful apps that improve daily life<br>
            创造改善生活的有意义的应用
        </div>
        
        <div class="language-selector">
            <a href="privacy_policy_zh.html" class="language-card">
                <div class="flag">📋</div>
                <div class="language-name">Privacy Policy</div>
                <div class="policy-name">隐私政策</div>
            </a>
            
            <a href="mailto:support@mement.vip" class="language-card">
                <div class="flag">📧</div>
                <div class="language-name">Contact Support</div>
                <div class="policy-name">联系技术支持</div>
            </a>
        </div>
        
        <div class="info">
            <p><strong>Email:</strong> support@mement.vip</p>
            <p style="margin-top: 10px; font-size: 12px;">
                © 2026 Mement. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
